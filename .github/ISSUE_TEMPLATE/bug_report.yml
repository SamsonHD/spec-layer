name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      placeholder: Include a minimal component fixture or Markdown file when possible.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node, operating system, browser, and Figma desktop version where relevant.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Data safety
      options:
        - label: I removed API keys, private Figma links, customer names, and proprietary design-system data.
          required: true
